kind = "web"
previewPath = "/"
title = "Global Digital Media Streaming Service"
version = "1.0.0"
id = "artifacts/streaming-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19326

[services.development]
run = "pnpm --filter @workspace/streaming-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streaming-site", "run", "build" ]
publicDir = "artifacts/streaming-site/dist"
serve = "static"

[services.env]
PORT = "19326"
